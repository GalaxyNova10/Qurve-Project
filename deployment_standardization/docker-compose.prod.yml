version: '3.8'

services:
  # PostgreSQL Database (Production)
  postgres:
    image: postgres:15-alpine
    container_name: qubo-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: qubo_platform
      POSTGRES_USER: qubo_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - qubo-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qubo_user -d qubo_platform"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Redis Cache (Production)
  redis:
    image: redis:7-alpine
    container_name: qubo-redis-prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_prod:/data
    ports:
      - "6379:6379"
    networks:
      - qubo-prod-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # QUBO Backend API (Production)
  qubo-backend:
    build:
      context: ../qubo-backend
      dockerfile: Dockerfile.prod
    container_name: qubo-backend-prod
    restart: always
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://qubo_user:${POSTGRES_PASSWORD}@postgres:5432/qubo_platform
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - LOG_LEVEL=INFO
      - MAX_WORKERS=8
      - WORKER_TIMEOUT=120
      - KEEPALIVE=65
      - MAX_REQUESTS=1000
      - MAX_REQUESTS_JITTER=100
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro
    ports:
      - "8000:8000"
    networks:
      - qubo-prod-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'

  # QUBO Frontend (Production)
  qubo-frontend:
    build:
      context: ../app
      dockerfile: Dockerfile.prod
    container_name: qubo-frontend-prod
    restart: always
    environment:
      - REACT_APP_API_URL=https://api.qurve.ai
      - REACT_APP_ENVIRONMENT=production
      - REACT_APP_VERSION=v1.0.0
    ports:
      - "3000:80"
    networks:
      - qubo-prod-network
    depends_on:
      - qubo-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Monitoring Stack (Production)
  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: qubo-prometheus-prod
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./monitoring/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data_prod:/prometheus
    ports:
      - "9090:9090"
    networks:
      - qubo-prod-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: qubo-grafana-prod
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data_prod:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - qubo-prod-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: qubo-nginx-prod
    restart: always
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - qubo-prod-network
    depends_on:
      - qubo-backend
      - qubo-frontend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  # Log Aggregation (Production)
  loki:
    image: grafana/loki:latest
    container_name: qubo-loki-prod
    restart: always
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki.prod-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data_prod:/loki
      - ./logs:/var/log/app:ro
    ports:
      - "3100:3100"
    networks:
      - qubo-prod-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # Backup Service (Production)
  backup:
    image: postgres:15-alpine
    container_name: qubo-backup-prod
    restart: always
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./backup-scripts:/scripts:ro
    networks:
      - qubo-prod-network
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        while true; do
          echo 'Starting backup at $(date)'
          pg_dump -h postgres -U qubo_user -d qubo_platform | gzip > /backups/qubo_backup_$(date +%Y%m%d_%H%M%S).sql.gz
          echo 'Backup completed at $(date)'
          echo 'Backup size: $(du -h /backups/qubo_backup_$(date +%Y%m%d_%H%M%S).sql.gz)'
          echo 'Cleaning old backups (keeping last 7 days)'
          find /backups -name '*.sql.gz' -mtime +7 -delete
          echo 'Verifying backup integrity'
          for backup in /backups/qubo_backup_*.sql.gz; do
            if [ -f \"$backup\" ]; then
              echo \"Verifying $backup\"
              gzip -t \"$backup\" && echo \"Backup $backup is valid\" || echo \"Backup $backup is CORRUPTED\"
            fi
          done
          echo 'Sleeping for 24 hours'
          sleep 86400
        done
      "
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

volumes:
  postgres_data_prod:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/postgres
  redis_data_prod:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/redis
  prometheus_data_prod:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/prometheus
  grafana_data_prod:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/grafana
  loki_data_prod:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/loki

networks:
  qubo-prod-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
          gateway: 172.21.0.1
    driver_opts:
      com.docker.network.bridge.name: qubo-prod
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
